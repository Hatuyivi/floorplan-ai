cat << 'EOF' > index.html
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FloorPlan AI - hatuyivi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="section">
            <h3>🔑 Google API</h3>
            <input type="password" id="api-key" placeholder="Вставьте ваш API Key">
            <button id="check-models">Проверить лимиты</button>
            <div id="model-info"></div>
        </div>
        <div class="section">
            <h3>📂 Планировка</h3>
            <input type="file" id="file-input" accept="image/*">
            <button id="process-btn" disabled>Запустить анализ</button>
        </div>
        <div class="section">
            <h3>🏠 Помещения</h3>
            <div id="room-list"></div>
        </div>
        <div class="footer-buttons">
            <button id="save-btn" style="display:none; background: #444;">Сохранить JSON</button>
            <button id="view-logs" style="background: transparent; color: #888; font-size: 11px; border: none;">Логи</button>
        </div>
    </div>
    <div class="canvas-container" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #1e1e1e;">
        <canvas id="main-canvas" style="max-width: 90%; max-height: 90%; background: white;"></canvas>
    </div>
    <div id="log-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100;">
        <div style="background:#1e1e1e; margin:10% auto; width:80%; padding:20px; color:#0fb100; font-family:monospace; border:1px solid #444;">
            <button onclick="document.getElementById('log-modal').style.display='none'">Закрыть</button>
            <pre id="log-area"></pre>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
EOF
